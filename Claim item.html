<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Item</title>
    <link rel="stylesheet" href="Claim item.css">
</head>
<body>

    <section class="claim-item-page">

        <div class="claim-item-header">

            <h1 class="claim-item-title">
                Claim This Item
            </h1>

            <p class="claim-item-subtitle">
                Provide details to verify ownership of the item.
            </p>

        </div>

        <div class="claim-item-form-card">

            <form>

                <div class="claim-form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>

                <div class="claim-form-group">
                    <label>Student ID</label>
                    <input type="text" placeholder="Enter your student ID">
                </div>

                <div class="claim-form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="claim-form-group">
                    <label>Phone Number</label>
                    <input type="text" placeholder="Enter your phone number">
                </div>

                <div class="claim-form-group">
                    <label>Reason for Claim</label>
                    <textarea rows="5"
                    placeholder="Explain why this item belongs to you"></textarea>
                </div>

                <div class="claim-form-group">
                    <label for="proof">Additional Proof (Optional)</label>
                    <input type="file" id="proof">
                </div>

                <button type="submit" class="claim-submit-button">
                    Submit Claim
                </button>

            </form>

        </div>

    </section>

</body>
</html>
