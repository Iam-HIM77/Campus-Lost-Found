<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <link rel="stylesheet" href="Reports.css">
</head>
<body>

    <section class="my-reports-page">

        <div class="my-reports-header">

            <h1>My Reports</h1>

            <p>
                View and manage all your lost and found reports.
            </p>

        </div>

        <!-- LOST REPORTS -->

        <div class="reports-section-title">
            <h2>My Lost Item Reports</h2>
        </div>

        <div class="reports-list">

            <div class="report-item-card">

                <div class="report-item-details">
                    <h3>Samsung Phone</h3>
                    <p>Lost at Main Library</p>
                    <span class="report-status pending-status">
                        Pending
                    </span>
                </div>

                <div class="report-action-buttons">
                    <button class="edit-report-button">
                        Edit
                    </button>

                    <button class="delete-report-button">
                        Delete
                    </button>
                </div>

            </div>

            <div class="report-item-card">

                <div class="report-item-details">
                    <h3>Student ID Card</h3>
                    <p>Lost at Lecture Hall B</p>
                    <span class="report-status recovered-status">
                        Recovered
                    </span>
                </div>

                <div class="report-action-buttons">
                    <button class="edit-report-button">
                        Edit
                    </button>

                    <button class="delete-report-button">
                        Delete
                    </button>
                </div>

            </div>

        </div>

        <!-- FOUND REPORTS -->

        <div class="reports-section-title">
            <h2>My Found Item Reports</h2>
        </div>

        <div class="reports-list">

            <div class="report-item-card">

                <div class="report-item-details">
                    <h3>Scientific Calculator</h3>
                    <p>Found at Engineering Block</p>
                    <span class="report-status approved-status">
                        Approved
                    </span>
                </div>

                <div class="report-action-buttons">
                    <button class="edit-report-button">
                        Edit
                    </button>

                    <button class="delete-report-button">
                        Delete
                    </button>
                </div>

            </div>

        </div>

    </section>

</body>
</html>
