<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="Profile.css">
</head>
<body>

    <section class="user-profile-page">

        <div class="user-profile-header">

            <div class="profile-picture-container">
                <img src="" alt="Profile Picture" class="user-profile-picture">
            </div>

            <h1 class="profile-user-name">
                KTU Student
            </h1>

            <p class="profile-user-role">
                Student
            </p>

        </div>

        <div class="profile-information-card">

            <h2 class="profile-section-title">
                Personal Information
            </h2>

            <div class="profile-details-grid">

                <div class="profile-detail-item">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" value="KTU Student">
                </div>

                <div class="profile-detail-item">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" value="STU001">
                </div>

                <div class="profile-detail-item">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" value="ktustu@gmail.com">
                </div>

                <div class="profile-detail-item">
                    <label for="contact">Phone Number</label>
                    <input type="text" id="contact" value="+233 55 123 4567">
                </div>

            </div>

            <button class="save-profile-button">
                Save Changes
            </button>

        </div>

    </section>

</body>
</html>
