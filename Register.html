<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Campus Lost & Found</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body>

    <div class="container">

        <!-- Left Side -->
        <div class="left-panel">
            <div class="overlay">
                <h1>Campus Lost & Found</h1>
                <p>
                    Join the platform and help reconnect students with
                    their lost belongings across campus.
                </p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="right-panel">

            <div class="form-container">

                <h2>Create Account</h2>
                <p class="subtitle">Register to get started</p>

                <form>

                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your full name">
                    </div>

                    <div class="input-group">
                        <label>Student ID</label>
                        <input type="text" placeholder="Enter your student ID">
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email">
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Enter your phone number">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create password">
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm password">
                    </div>

                    <button type="submit" class="register-btn">
                        Create Account
                    </button>

                </form>

                <p class="login-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </div>

        </div>

    </div>

</body>
</html>
