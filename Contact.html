<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="Contact.css">
</head>
<body>

    <section class="contact-page">

        <!-- Header Section -->
        <div class="contact-header">

            <h1 class="contact-title">
                Contact Us
            </h1>

            <p class="contact-subtitle">
                Have questions or need help? Send us a message.
            </p>

        </div>

        <!-- Contact Content -->
        <div class="contact-content-wrapper">

            <!-- Contact Form -->
            <div class="contact-form-card">

                <form>

                    <div class="contact-form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your name">
                    </div>

                    <div class="contact-form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email">
                    </div>

                    <div class="contact-form-group">
                        <label>Subject</label>
                        <input type="text" placeholder="Enter subject">
                    </div>

                    <div class="contact-form-group">
                        <label>Message</label>
                        <textarea rows="6" placeholder="Write your message"></textarea>
                    </div>

                    <button type="submit" class="contact-submit-button">
                        Send Message
                    </button>

                </form>

            </div>

            <!-- Contact Info -->
            <div class="contact-info-card">

                <h2 class="contact-info-title">Get In Touch</h2>

                <p class="contact-info-text">
                    We are here to help students recover lost items and manage found belongings across campus.
                </p>

                <div class="contact-info-item">
                    <strong>Email:</strong>
                    <span>support@campuslostfound.com</span>
                </div>

                <div class="contact-info-item">
                    <strong>Phone:</strong>
                    <span>+233 55 123 4567</span>
                </div>

                <div class="contact-info-item">
                    <strong>Location:</strong>
                    <span>Koforidua Technical University, Ghana</span>
                </div>

            </div>

        </div>

    </section>

</body>
</html>
